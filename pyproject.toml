[build-system]
requires = ["setuptools>=69.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "contopo"
version = "0.1.0"
description = "Topographic representations in neural networks — CE training, profiling, ensembles"
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0",
    "torchvision>=0.15",
    "hydra-core>=1.3",
    "omegaconf>=2.3",
    "mlflow>=2.8",
    "numpy>=1.24",
    "scipy>=1.10",
    "scikit-learn>=1.3",
    "matplotlib>=3.7",
    "pyyaml>=6.0",
    "gitpython>=3.1",
    "psutil>=5.9",
    "pyzmq>=27.1.0",
]

[project.optional-dependencies]
zarr = ["zarr>=2.16"]
dev = ["pytest>=7.0", "pytest-cov"]

[tool.setuptools.packages.find]
include = ["src*", "conf*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
