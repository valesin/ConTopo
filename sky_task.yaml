resources:
  infra: runpod/CZ
  accelerators: RTX4090:1
  image_id: ghcr.io/valesin/contopo:latest
  use_spot: false

envs:
  # Per-job overrides — set at launch time via --env
  LOSS_RHO: "0.0"
  TRIAL: "0"
  # MLflow non-sensitive config — read from local shell, or override with --env
  MLFLOW_S3_ENDPOINT_URL: null
  MLFLOW_TRACKING_USERNAME: null
  MLFLOW_TRACKING_URI: null           # must come from shell via --env
  MLFLOW_ARTIFACT_LOCATION: null      # must come from shell via --env
  MLFLOW_EXPERIMENT_NAME: null        # must come from shell via --env
  # Runtime tuning — GPU cloud defaults; override with --env for different hardware
  CONTOPO_DEVICE: "cuda"
  CONTOPO_NUM_WORKERS: "4"
  CONTOPO_PERSISTENT_WORKERS: "true"
  CONTOPO_INFERENCE_BATCH_SIZE: "512"
  CONTOPO_INFERENCE_NUM_WORKERS: "4"

secrets:
  # Credentials — redacted in logs, read from local shell
  AWS_ACCESS_KEY_ID: null
  AWS_SECRET_ACCESS_KEY: null
  MLFLOW_TRACKING_PASSWORD: null
  SKYPILOT_DOCKER_USERNAME: null
  SKYPILOT_DOCKER_SERVER: null
  SKYPILOT_DOCKER_PASSWORD: null

run: |
  cd /workspace/ConTopo
  python scripts/01_train_models.py \
    loss.rho=${LOSS_RHO} trial=${TRIAL} \
    mlflow.tracking_uri="${MLFLOW_TRACKING_URI}" \
    mlflow.artifact_location="${MLFLOW_ARTIFACT_LOCATION}" \
    mlflow.experiment_name="${MLFLOW_EXPERIMENT_NAME}" \
    runtime.device="${CONTOPO_DEVICE}" \
    runtime.num_workers="${CONTOPO_NUM_WORKERS}" \
    runtime.persistent_workers="${CONTOPO_PERSISTENT_WORKERS}" \
    runtime.inference.batch_size="${CONTOPO_INFERENCE_BATCH_SIZE}" \
    runtime.inference.num_workers="${CONTOPO_INFERENCE_NUM_WORKERS}"
