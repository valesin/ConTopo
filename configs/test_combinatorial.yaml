model_dir: "save/ResNet18/models"
runs:
  - "crossentropy_wstopo_torus_256embdims_0.008rho_50epochs_512bsz_2nwork_0.002lr_0.5dropout"
  - "crossentropy_wstopo_torus_256embdims_0.04rho_50epochs_512bsz_2nwork_0.002lr_0.5dropout"
  - "crossentropy_wstopo_torus_256embdims_0.0rho_50epochs_512bsz_2nwork_0.002lr_0.5dropout"
data_root: "dataset"
batch_size: 100
save_dir: "save/ensembles_test"
min_k: 2
max_k: 3

# Which diversity metrics to compute (omit to use all available)
metrics:
  - pred_disagreement
  - q_statistic
  - double_fault
  - output_correlation
  - jaccard
  - cohens_kappa

# Which ensemble combination strategies (omit to use all available)
ensemble_methods:
  - soft
  - hard
  - max_confidence
  - conf_weighted
