adapter:
  epochs: 50
  learning_rate: 0.001
  batch_size: 256
  bias: true
  dropout: 0.3
  meta_type: meta_lr
  feature_type: logits
  similarity_metric: cosine
  hidden_dim: 128
schema_version: 1
trial: 1
seed: null
migration:
  dry_run: false
