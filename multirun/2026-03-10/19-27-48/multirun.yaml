hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - loss.rho=0.04,0.2
    - trial=0,1
  job:
    name: 01_train_models
    chdir: null
    override_dirname: loss.rho=0.04,0.2,trial=0,1
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/vlr/Workspaces/Topographic/ConTopo
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/vlr/Workspaces/Topographic/ConTopo/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      adapter: default
      ensemble: ce_ensembles
      mlflow: default
      pipeline: default
      runtime: default
      training: default
      dataset: cifar10
      loss: cross_entropy
      model: resnet18
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
model:
  name: resnet18
  arch: LinearResNet18
  embedding_dim: 256
  num_classes: 10
  use_dropout: true
  p_dropout: 0.5
  head:
    bias: true
loss:
  name: cross_entropy
  rho: 0.0
  topography_type: ws
  topology: grid
  task_loss: cross_entropy
  neighborhood:
    type: moore
    radius: 1
dataset:
  name: cifar10
  num_classes: 10
  image_size: 32
  in_channels: 3
  mean:
  - 0.4914
  - 0.4822
  - 0.4465
  std:
  - 0.2023
  - 0.1994
  - 0.201
  split:
    strategy: seeded_per_class
    seed: 0
    val_per_class: 500
  transforms:
    preset: cifar10_resizedcrop_v1
training:
  epochs: 200
  batch_size: 512
  learning_rate: 0.002
  optimizer: adam
  weight_decay: 0.0
  momentum: 0.9
  scheduler: none
  amp: false
  save_freq_epochs: 20
  early_stopping_patience: 25
  balancer:
    beta: 0.1
    eps: 1.0e-08
    lambda_max: 10000.0
runtime:
  device: cuda
  data_parallel: false
  num_workers: 2
  pin_memory: true
  persistent_workers: false
  print_freq: 10
  data_root: ./dataset
  artifacts_root: artifacts
  models_root: save/ResNet18/models
  inference:
    batch_size: 256
    num_workers: 2
  storage:
    backend: pt
pipeline:
  anchors:
    per_class: 100
    strategy: per_class_first_n
    order_by: example_id
    source_split: test
  split: test
  force: false
mlflow:
  tracking_uri: sqlite:///mlflow.db
  experiment_name: contopo
ensemble:
  meta_split:
    seed: 42
    strategy: random
    fractions:
      train: 0.6
      val: 0.2
      holdout: 0.2
  default_anchor_selection:
    per_class: 100
    strategy: per_class_first_n
    order_by: example_id
  ensembles:
  - name: CE_torus_rho0
    selector:
      loss_type: cross_entropy
      topology: torus
      rho:
        eq: '0.0'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_torus_rho0.008
    selector:
      loss_type: cross_entropy
      topology: torus
      rho:
        eq: '0.008'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_torus_rho0.04
    selector:
      loss_type: cross_entropy
      topology: torus
      rho:
        eq: '0.04'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_torus_rho0.2
    selector:
      loss_type: cross_entropy
      topology: torus
      rho:
        eq: '0.2'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_torus_rho1
    selector:
      loss_type: cross_entropy
      topology: torus
      rho:
        eq: '1.0'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_torus_rho5
    selector:
      loss_type: cross_entropy
      topology: torus
      rho:
        eq: '5.0'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_grid_rho0
    selector:
      loss_type: cross_entropy
      topology: grid
      rho:
        eq: '0.0'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_grid_rho0.008
    selector:
      loss_type: cross_entropy
      topology: grid
      rho:
        eq: '0.008'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_grid_rho0.04
    selector:
      loss_type: cross_entropy
      topology: grid
      rho:
        eq: '0.04'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_grid_rho0.2
    selector:
      loss_type: cross_entropy
      topology: grid
      rho:
        eq: '0.2'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_grid_rho1
    selector:
      loss_type: cross_entropy
      topology: grid
      rho:
        eq: '1.0'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
  - name: CE_grid_rho5
    selector:
      loss_type: cross_entropy
      topology: grid
      rho:
        eq: '5.0'
      trial:
        range:
        - 0
        - 4
    votes:
    - soft
    - hard
    - max_confidence
    - conf_weighted
adapter:
  epochs: 50
  learning_rate: 0.001
  batch_size: 256
  bias: true
  dropout: 0.3
  meta_type: meta_lr
  feature_type: logits
  similarity_metric: cosine
  hidden_dim: 128
schema_version: 1
trial: 0
seed: null
migration:
  dry_run: false
