# ─────────────────────────────────────────────────────────────
# ConTopo — Master Hydra Configuration
# ─────────────────────────────────────────────────────────────
defaults:
  - model: resnet18
  - loss: cross_entropy
  - dataset: cifar10
  - training: default
  - runtime: default
  - groups: default
  - profiling: default
  - analysis: default
  - execution: default
  - mlflow: default
  - ensemble: dynamic
  - adapter: default
  - pipeline: default
  - _self_

# ── Schema ──
schema_version: 1

# ── Sweep / override surface (experiment-semantic) ──
trial: 0
seed: null          # null → auto: 100 + trial

# Hydra internals
hydra:
  run:
    dir: ./outputs/hydra/${hydra.job.name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ./outputs/hydra/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
  job_logging:
    root:
      level: WARNING
    loggers:
      hydra:
        level: WARNING