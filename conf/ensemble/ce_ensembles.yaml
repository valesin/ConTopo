# ── CE ensembles — torus topology (5 trials per rho) ──
# Extend trial range to {range: [0, 9]} when 10 trials are trained.
#
# Meta-learner type, feature_type, similarity_metric, etc. are now configured
# via conf/adapter/default.yaml and swept with --multirun, e.g.:
#   python scripts/05_train_adapters.py --multirun \
#     adapter.meta_type=meta_lr,meta_mlp \
#     adapter.feature_type=logits,embeddings,embeddings+profiles

ensembles:
  - name: CE_torus_rho0
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.0"}
      trial: {range: [0, 4]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_torus_rho0.008
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.008"}
      trial: {range: [0, 4]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_torus_rho0.04
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.04"}
      trial: {range: [0, 4]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_torus_rho0.2
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.2"}
      trial: {range: [0, 4]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_torus_rho1
    selector:
      loss_type: cross_entropy
