# ── Pipeline B: Full Production Sweep ──
# 5 rho values (0.0, 0.02, 0.04, 0.08, 0.16), 10 trials (0–9),
# both grid and torus topologies.
# 10 ensembles: one per (rho × topology), each with 10 trials.

ensembles:
  # ── Grid ensembles ──
  - name: CE_grid_rho0
    selector:
      loss_type: cross_entropy
      topology: grid
      rho: {eq: "0.0"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_grid_rho0.02
    selector:
      loss_type: cross_entropy
      topology: grid
      rho: {eq: "0.02"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_grid_rho0.04
    selector:
      loss_type: cross_entropy
      topology: grid
      rho: {eq: "0.04"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_grid_rho0.08
    selector:
      loss_type: cross_entropy
      topology: grid
      rho: {eq: "0.08"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_grid_rho0.16
    selector:
      loss_type: cross_entropy
      topology: grid
      rho: {eq: "0.16"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  # ── Torus ensembles ──
  - name: CE_torus_rho0
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.0"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_torus_rho0.02
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.02"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_torus_rho0.04
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.04"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_torus_rho0.08
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.08"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]

  - name: CE_torus_rho0.16
    selector:
      loss_type: cross_entropy
      topology: torus
      rho: {eq: "0.16"}
      trial: {range: [0, 9]}
    votes: [soft, hard, max_confidence, conf_weighted]
