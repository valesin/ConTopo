# ── Runtime parameters (do NOT affect results → excluded from cfg_hash) ──
device: ${oc.env:CONTOPO_DEVICE,cuda}            # auto | cuda | cpu
data_parallel: false                             # hardcoded: single-GPU per job only
num_workers: ${oc.env:CONTOPO_NUM_WORKERS,1}
pin_memory: ${oc.env:CONTOPO_PIN_MEMORY,true}
persistent_workers: ${oc.env:CONTOPO_PERSISTENT_WORKERS,false}
print_freq: 20

# Paths (platform-specific)
data_root: ${oc.env:CONTOPO_DATA_ROOT,./dataset}
outputs_root: outputs

# Centralized output paths (all relative to outputs_root)
paths:
  anchors: anchors        # deterministic anchor selections

# Inference caching
inference:
  batch_size: ${oc.env:CONTOPO_INFERENCE_BATCH_SIZE,256}
  num_workers: ${oc.env:CONTOPO_INFERENCE_NUM_WORKERS,1}
