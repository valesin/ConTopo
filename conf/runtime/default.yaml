# ── Runtime parameters (do NOT affect results → excluded from cfg_hash) ──
device: cuda                                     # auto | cuda | cpu
# On shared GPUs, memory fragmentation can cause OOM even with headroom. Set:
#   PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
# before launching to let the allocator grow segments instead of pre-reserving.
data_parallel: false                             # hardcoded: single-GPU per job only
num_workers: 2
pin_memory: true
persistent_workers: false
print_freq: 30
verbose_upload_log: false        # set true to print [UPLOAD START/END] timing for every MLflow call

# Paths (platform-specific)
data_root: ./dataset
outputs_root: outputs

# Centralized output paths (all relative to outputs_root)
paths:
  anchors: anchors        # deterministic anchor selections

# Inference caching
inference:
  batch_size: 256
  num_workers: 2

# FFCV .beton file storage location (hash-excluded — operational only)
# Format settings (max_resolution, jpeg_quality, compress_probability) live in
# training.beton because they affect training data and are hash-included.
beton:
  dir: outputs/betons   # directory for generated .beton files
