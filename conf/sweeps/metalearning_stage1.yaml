# @package _global_

# Stage 1: non-profile feature sweeps (no similarity_metric)
master_seed: 42

adapter:
  init_seed: ${master_seed}
  meta_split:
    seed: ${master_seed}

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      adapter.meta_type: meta_lr, meta_mlp_2
      adapter.feature_type: logits, embeddings
      adapter.profile_mask: true_class
      master_seed: range(42,52)
