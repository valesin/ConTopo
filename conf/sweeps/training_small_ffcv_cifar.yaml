# @package _global_
# Small FFCV sweep on CIFAR-10 — mirrors training_small.yaml but uses the FFCV
# data loading backend.  Intended for fast end-to-end debugging of the FFCV path.
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      trial: range(0, 2)
      loss.rho: 0.0, 1.0
      training.epochs: 2
      model: simple_cnn

training:
  loading_backend: ffcv
  beton:
    max_resolution: 32    # CIFAR-10 native resolution
    jpeg_quality: 90
    compress_probability: 0.50
