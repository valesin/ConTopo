# @package _global_
# Smoke test (extended) — CIFAR-10, simple_cnn, 1 epoch, 11 trials.
#
# Like dev_smoke but covers more trials to stress-test run deduplication
# and MLflow logging under repeated runs.
#
# Usage:
#   python main.py +sweeps=dev_smoke_t10

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      trial: range(0, 11)
      loss.rho: 0.0, 1.0, 5.0
      training.epochs: 1
      model: simple_cnn
