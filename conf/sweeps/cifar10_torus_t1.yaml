# @package _global_
# CIFAR-10 training sweep — torus topology only, 5 trials.
#
# Lighter version of cifar10_torus_t10 for quick exploration.
# 6 rho values × 5 trials = 30 runs.
#
# Usage:
#   python main.py +sweeps=cifar10_torus_t5

defaults:
  - override /dataset: cifar10
  - override /model: resnet18
  - override /profiling: default

mlflow:
  experiment_name: contopo_cifar10

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      trial: 0
      loss.rho: 0.0, 0.008, 0.04, 0.2, 1.0, 5.0
      loss.topology: torus