# @package _global_
# CIFAR-10 training sweep — torus topology only, 10 trials.
#
# Use when grid runs already exist and only torus results are needed.
# 6 rho values × 10 trials = 60 runs.
#
# Usage:
#   python main.py +sweeps=cifar10_torus_t10

defaults:
  - override /dataset: cifar10
  - override /model: resnet18
  - override /profiling: default

mlflow:
  experiment_name: contopo_cifar10

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      trial: range(0, 10)
      loss.rho: 0.0, 0.008, 0.04, 0.2, 1.0, 5.0
      loss.topology: torus
