# @package _global_
# Smoke test — CIFAR-10, simple_cnn, 1 epoch, 2 trials.
#
# Minimal sweep to verify the training pipeline end-to-end without
# committing to full training. Completes in seconds.
#
# Usage:
#   python main.py +sweeps=dev_smoke

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      trial: range(0, 2)
      loss.rho: 0.0, 1.0
      training.epochs: 1
      model: simple_cnn
