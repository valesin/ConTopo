# @package _global_
# Training sweep for ImageNet100 / ResNet34 — FFCV full recipe.
#
# Uses the FFCV data loading backend with the full high-throughput training recipe:
# SGD + OneCycleLR, label smoothing, blurpool, test-time augmentation, and
# progressive resolution (160→192px).
#
# Usage (single run):
#   uv run scripts/01_train_models.py \
#     +sweeps=training_rho_imagenet100_ffcv \
#     loss.rho=0.0 loss.topology=torus trial=0
#
# Usage (full sweep via orchestrator):
#   python main.py +sweeps=training_rho_imagenet100_ffcv
#
# Beton files are written on first run to runtime.beton.dir and reused thereafter.
# See docs/ffcv_param_assumptions.md for migration notes if you have existing runs.

defaults:
  - override /dataset: imagenet100
  - override /model: resnet34_imagenet100
  - override /profiling: imagenet100

mlflow:
  experiment_name: contopo_imagenet100_ffcv

runtime:
  beton:
    dir: outputs/betons   # storage location only — format settings live in training.beton

training:
  loading_backend: ffcv
  beton:
    max_resolution: 500
    jpeg_quality: 90
    compress_probability: 0.50
  epochs: 16
  batch_size: 1024
  learning_rate: 0.5
  optimiser: sgd
  optimizer_selective_wd: true
  momentum: 0.9
  weight_decay: 0.00005
  scheduler: cyclic
  lr_peak_epoch: 2
  label_smoothing: 0.1
  use_blurpool: true
  lr_tta: true
  progressive_res_min: 160
  progressive_res_max: 192
  progressive_res_start_ramp: 0.75
  progressive_res_end_ramp: 1.0

# Sweep axes — same rho/topology/trial ranges as torch sweep
trial: range(0, 10)
loss:
  rho: 0.0, 0.008, 0.04, 0.2, 1.0, 5.0
  topology: torus, grid
