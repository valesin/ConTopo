# @package _global_
# ImageNet100 training sweep — torch backend, fine-tuning regime, 10 trials.
#
# Fine-tunes a pretrained ResNet34 backbone on the 100-class ImageNet subset.
# Requires data at <runtime.data_root>/imagenet100/{train,val}/  (see docs/adding_datasets.md).
# 6 rho values × 2 topologies × 10 trials = 120 runs.
#
# Usage:
#   python main.py +sweeps=imagenet100_t10
#
# Downstream steps (02–05) require the same overrides:
#   python scripts/02_cache_inference.py \
#     dataset=imagenet100 model=resnet34_imagenet100 profiling=imagenet100 \
#     mlflow.experiment_name=contopo_imagenet100

defaults:
  - override /dataset: imagenet100
  - override /model: resnet34_imagenet100
  - override /profiling: imagenet100

mlflow:
  experiment_name: contopo_imagenet100

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.0001

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      trial: range(0, 10)
      loss.rho: 0.0, 0.008, 0.04, 0.2, 1.0, 5.0
      loss.topology: torus, grid
