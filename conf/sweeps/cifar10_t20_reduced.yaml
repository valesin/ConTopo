# @package _global_
# CIFAR-10 training sweep — full rho grid, both topologies, 20 trials.
#
# Extended trial count for tighter variance estimates.
# 6 rho values × 2 topologies × 20 trials = 240 runs.
#
# Usage:
#   python main.py +sweeps=cifar10_t20

defaults:
  - override /dataset: cifar10
  - override /model: resnet18
  - override /profiling: default

mlflow:
  experiment_name: contopo_cifar10

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      trial: range(0, 20)
      loss.rho: 0.0, 0.008, 0.04, 0.2
      loss.topology: grid