# Profiling config for ImageNet100
# Scales anchor count down to match CIFAR-10 total (≈1 000 anchors):
#   10 anchors/class × 100 classes = 1 000 total
# (CIFAR-10 default: 100/class × 10 classes = 1 000 total)

anchors:
  per_class: 10                   # N anchors per class; total = per_class * num_classes
  strategy: per_class_first_n     # selection strategy
  order_by: example_id            # stable ordering key: example_id | original_index
  source_split: test              # draw anchors from the held-out test split (5 000 images)

profiles:
  skip: false
  metrics: [cosine]

diagnostics:
  morans_i: true
  weight_norms: true
  unit_distance_correlation: true
