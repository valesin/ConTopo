# CIFAR-10 dataset config
name: cifar10
num_classes: 10
image_size: 32
in_channels: 3
mean: [0.4914, 0.4822, 0.4465]
std:  [0.2023, 0.1994, 0.2010]

split:
  strategy: seeded_per_class     # deterministic split method
  seed: 0                        # split random seed (0 = use original_index order)
  val_per_class: 500             # 500 per class → 5 000 val, 45 000 train

transforms:
  preset: cifar10_resizedcrop_v1 # named preset (see src/data/transforms.py)
