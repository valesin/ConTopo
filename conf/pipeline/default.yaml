# @package pipeline
# Full production pipeline.
# Usage: python main.py
from_step: null
steps:
  - id: train
    script: 01_train_models.py
    sweep: training_rho
    description: "Train CE models"
  - id: inference
    script: 02_cache_inference.py
    sweep: training_rho
    description: "Cache inference artifacts"
  - id: profiles
    script: 03_compute_profiles.py
    sweep: training_rho
    description: "Compute category similarity profiles"
  - id: diagnostics
    script: 03b_compute_diagnostics.py
    sweep: training_rho
    description: "Compute per-model diagnostics"
  - id: ensemble
    script: 04_run_ensemble.py
    description: "Build ensembles"
  - id: diversity
    script: 04b_compute_diversity.py
    description: "Compute ensemble diversity metrics"
  - id: consistency
    script: 04c_compute_consistency.py
    description: "Compute ensemble RDM/RSA consistency"
  - id: adapters
    script: 05_train_adapters.py
    sweep: metalearning
    description: "Train meta-learner adapters"
