# ── Pipeline / analysis defaults ──
# These settings affect downstream profiling/analysis, not training.
# Excluded from model cfg_hash.
anchors:
  per_class: 100                   # N anchors per class; total = per_class * num_classes
  strategy: per_class_first_n      # selection strategy
  order_by: example_id             # stable ordering key: example_id | original_index
  source_split: test               # which dataset split to draw anchors from

# Evaluation split for inference / profiling / ensemble
split: test

# Force recomputation of cached artifacts
force: false

# ── Per-model diagnostics (step 03b, optional) ──
diagnostics:
  morans_i: true
  weight_norms: true
  unit_distance_correlation: true

# ── Post-ensemble diversity metrics (step 04b, optional) ──
diversity:
  enabled: true
  metrics: [q_statistic, disagreement, double_fault, correlation, interrater_agreement]

# ── Post-ensemble RDM/RSA consistency (step 04c, optional) ──
consistency:
  enabled: true
