# ── MLflow tracking (excluded from cfg_hash) ──

# Paths use ${hydra:runtime.cwd} to stay absolute regardless of invocation directory.
#
# Environment variables (optional, override YAML defaults, overridden by Hydra CLI args):
#   MLFLOW_TRACKING_URI      — remote tracking server URL
#   MLFLOW_ARTIFACT_LOCATION — remote artifact store URL
#   MLFLOW_EXPERIMENT_NAME   — experiment name
tracking_uri: sqlite:///${hydra:runtime.cwd}/outputs/mlflow.db
artifact_location: ${hydra:runtime.cwd}/outputs/mlruns
artifact_cache_dir: ${hydra:runtime.cwd}/outputs/mlflow_artifact_cache
experiment_name: contopo
enable_system_metrics: false